<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>Wilson T41 | 7-12 Hex Layout</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <div id="global-controls" class="glass-panel controls-panel">
      <!-- MODO TOGGLE -->
      <div class="control-section">
        <span class="control-label">MODO</span>
        <div class="mode-toggle-container">
          <label class="switch-toggle mode-switch">
            <input type="checkbox" id="mode-toggle" checked> <!-- Checked = Config Mode by default -->
            <span class="slider-round"></span>
          </label>
          <span id="mode-label" class="mode-text">EDIT</span>
        </div>
      </div>
      
      
      <div class="control-divider"></div>
      
      <!-- COMPOSITION TOOLS TOGGLE -->
      <div class="control-section">
        <span class="control-label">COMP</span>
        <button id="comp-tools-toggle" class="btn-ctrl btn-panic">HERRAMIENTAS</button>
      </div>
      
      <div class="control-divider"></div>

      <!-- ZOOM CONTROLS -->
      <div id="zoom-controls" class="control-section">
        <span class="control-label">ZOOM</span>
        <div class="zoom-buttons">
          <button id="zoom-out" class="btn-ctrl">-</button>
          <span id="zoom-display" class="zoom-display">100%</span>
          <button id="zoom-in" class="btn-ctrl">+</button>
        </div>
      </div>

      <div class="control-divider show-config-only"></div>

      <div class="control-section">
        <span class="control-label">OCTAVA</span>
        <div class="octave-controls">
          <button id="oct-down" class="btn-ctrl">-</button>
          <div id="oct-display" class="oct-display">0</div>
          <button id="oct-up" class="btn-ctrl">+</button>
        </div>
      </div>
      <div class="control-divider"></div>

      <div class="control-section">
        <span class="control-label">PÁNICO</span>
        <div class="panic-controls">
          <button id="panic-notes" class="btn-ctrl btn-panic">NOTES OFF</button>
          <button id="panic-sound" class="btn-ctrl btn-panic">SOUND OFF</button>
        </div>
      </div>

      <div class="control-divider show-config-only"></div>

      <!-- UI ZOOM CONTROLS -->
      <div id="ui-zoom-controls" class="control-section show-config-only">
        <span class="control-label">UI ZOOM</span>
        <div class="zoom-buttons">
          <button id="ui-zoom-out" class="btn-ctrl">-</button>
          <span id="ui-zoom-display" class="zoom-display">100%</span>
          <button id="ui-zoom-in" class="btn-ctrl">+</button>
        </div>
      </div>

      <div class="control-divider show-config-only"></div>

      <div class="control-section osc-setup show-config-only">
        <div class="osc-input-group">
          <span class="osc-minilabel">IP</span>
          <input type="text" id="osc-ip" class="osc-input" value="127.0.0.1" spellcheck="false">
        </div>
        <div class="osc-input-group">
          <span class="osc-minilabel">PORT</span>
          <input type="number" id="osc-port" class="osc-input" value="8000">
        </div>
        <div class="osc-toggle-group">
          <label class="switch-toggle">
            <input type="checkbox" id="osc-toggle">
            <span class="slider-round"></span>
          </label>
          <div class="led-indicators">
            <div class="led-item">
              <div id="osc-led-send" class="led-red"></div>
              <span class="led-label">SEND</span>
            </div>
            <div class="led-item">
              <div id="osc-led-link" class="led-red"></div>
              <span class="led-label">LINK</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <main class="keyboard-viewport" id="keyboard-viewport">
      <div id="hex-grid" class="hex-grid"></div>
    </main>
    
    <!-- Monitor de Salida UI -->
    <div id="output-monitor" class="glass-panel monitor">
      <div id="monitor-content" class="monitor-content">Esperando MIDI/OSC...</div>
    </div>

    <!-- Composition Tools Panel -->
    <div id="comp-tools-panel" class="glass-panel comp-panel">
      <div class="comp-header">
        <h3>Herramientas de Composición</h3>
      </div>
      <div class="comp-content">
        <div class="comp-section">
          <h4>Pitch Class Set Calculator (41-TET)</h4>
          <div class="input-group">
            <label>Set (ej. 0 12 24):</label>
            <input type="text" id="set-input" placeholder="Ingresa notas..." class="comp-input">
          </div>
          <div class="input-group">
            <label>Transposición (Tn):</label>
            <input type="number" id="trans-input" value="0" class="comp-input">
          </div>
          <div class="input-group">
            <label>Inversión (In) índice:</label>
            <input type="number" id="inv-input" placeholder="Opcional" class="comp-input">
          </div>
          <button id="calc-set-btn" class="btn-ctrl btn-calc">CALCULAR</button>
          <div class="result-box">
            <span>Resultado: </span><span id="set-result">-</span>
          </div>
        </div>
        <div class="comp-section">
          <h4>MOS Generator</h4>
          <p class="coming-soon">Próximamente...</p>
        </div>
      </div>
    </div>
  </div>
  <script src="composition-tools.js"></script>
  <script src="main.js"></script>
</body>
</html>
