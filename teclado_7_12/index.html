<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wilson T41 | 7-12 Hex Layout</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header class="glass-panel header">
      <h1>Wilson T41-7_12</h1>
    </header>

    <div id="global-controls" class="glass-panel controls-panel">
      <div class="control-section">
        <span class="control-label">OCTAVA</span>
        <div class="octave-controls">
          <button id="oct-down" class="btn-ctrl">-</button>
          <div id="oct-display" class="oct-display">0</div>
          <button id="oct-up" class="btn-ctrl">+</button>
        </div>
      </div>
      <div class="control-divider"></div>
      <div class="control-section">
        <span class="control-label">PÁNICO</span>
        <div class="panic-controls">
          <button id="panic-notes" class="btn-ctrl btn-panic">NOTES OFF</button>
          <button id="panic-sound" class="btn-ctrl btn-panic">SOUND OFF</button>
        </div>
      </div>
    </div>

    <main class="keyboard-viewport">
      <div id="hex-grid" class="hex-grid"></div>
    </main>
    
    <!-- Monitor de Salida UI -->
    <div id="output-monitor" class="glass-panel monitor">
      <h3>Salida a MAX/MSP</h3>
      <div id="monitor-content" class="monitor-content">Esperando MIDI/OSC...</div>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
