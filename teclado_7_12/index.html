<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wilson T41 | 7-12 Hex Layout</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header class="glass-panel header">
      <h1>Wilson T41-TET</h1>
      <p>Microtonal 7-12 Honeycomb Keyboard</p>
    </header>
    <main class="keyboard-viewport">
      <div id="hex-grid" class="hex-grid"></div>
    </main>
    
    <!-- Monitor de Salida UI -->
    <div id="output-monitor" class="glass-panel monitor">
      <h3>Salida a MAX/MSP</h3>
      <div id="monitor-content" class="monitor-content">Esperando MIDI/OSC...</div>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
